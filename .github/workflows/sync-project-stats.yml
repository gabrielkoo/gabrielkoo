name: Sync Project Stats

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all public repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, urllib.request, os, pathlib

          headers = {
            'Authorization': f'Bearer {os.environ["GH_TOKEN"]}',
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }

          all_repos = []
          page = 1
          while True:
            url = f'https://api.github.com/users/gabrielkoo/repos?type=public&per_page=100&sort=stars&direction=desc&page={page}'
            req = urllib.request.Request(url, headers=headers)
            with urllib.request.urlopen(req) as r:
              repos = json.loads(r.read())
              if not repos:
                break
              all_repos.extend(repos)
              if len(repos) < 100:
                break
              page += 1

          data = [
            {
              'name': d['name'],
              'description': d['description'],
              'stars': d['stargazers_count'],
              'forks': d['forks_count'],
              'language': d['language'],
              'url': d['html_url'],
              'topics': d.get('topics', []),
              'updated_at': d['updated_at'],
            }
            for d in all_repos
            if not d['fork']
          ]

          pathlib.Path('data').mkdir(exist_ok=True)
          with open('data/projects.json', 'w') as f:
            json.dump(data, f, indent=2)

          print(f'Synced {len(data)} public repos')
          EOF

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || (git commit -m 'chore: sync project stats' && git push)
